<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Web Exploration Start Portal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      align-items: center;
      justify-content: center;
    }

    /* Slick top header bar matching Puter Unofficial theme */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #333;
      color: #fff;
      padding: 8px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      z-index: 100;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .exit-btn {
      color: #f4f4f4;
      background-color: #d93025;
      border-radius: 18px;
      padding: 0 15px;
      height: 38px;
      font-weight: bold;
      font-size: 13px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background-color 0.2s;
    }

    .exit-btn:active {
      background-color: #b52218;
    }

    /* Standard scraper action button matching the native app styles */
    .scraper-btn {
      color: #f4f4f4;
      background-color: #1a73e8;
      border-radius: 18px;
      padding: 0 15px;
      height: 38px;
      font-weight: bold;
      font-size: 13px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background-color 0.2s;
    }

    .scraper-btn:active {
      background-color: #1557b0;
    }

    .header-title {
      font-size: 15px;
      font-weight: bold;
      color: #fff;
    }

    /* Centralized Search and Exploration Container */
    .portal-container {
      width: 90%;
      max-width: 500px;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
    }

    .portal-logo {
      font-size: 80px;
      color: #1a73e8;
      margin-bottom: 15px;
    }

    .portal-title {
      font-size: 22px;
      color: #333;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .portal-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 28px;
      padding: 4px 16px;
      height: 52px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      border: 1px solid #ddd;
    }

    .search-wrapper input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #333;
      background: transparent;
    }

    .search-btn {
      background: none;
      border: none;
      color: #1a73e8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .search-btn span {
      font-size: 28px;
    }
  </style>
</head>
<body>

  <!-- Local Start Header -->
  <header>
    <button class="exit-btn" onclick="exitBrowser()">
      <span class="material-symbols-outlined" style="font-size: 18px;">chat</span> Exit to Chat
    </button>
    <div class="header-title">Web Browser Portal</div>
    <button class="scraper-btn" onclick="goToScraper()">
      <span class="material-symbols-outlined" style="font-size: 18px;">table_rows</span> Scraper Dashboard
    </button>
  </header>

  <!-- Central Landing Area -->
  <div class="portal-container">
    <span class="material-symbols-outlined portal-logo">travel_explore</span>
    <div class="portal-title">Explore Web Content</div>
    <div class="portal-desc">Enter an address or type a query to browse, summarize, and catalog target web documents.</div>

    <!-- Central Search Input Box -->
    <div class="search-wrapper">
      <input type="text" id="portalAddressInput" placeholder="Enter web address or search query..." onkeydown="handlePortalKey(event)">
      <button class="search-btn" onclick="navigatePortalAddress()">
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </div>

  <script>
    // --- TOTAL SURVEILLANCE: GLOBAL EXCEPTION INTERCEPTORS ---
    window.onerror = function(message, source, lineno, colno, error) {
        if (window.AndroidInterface && window.AndroidInterface.logHtmlGlitch) {
            const stack = error ? error.stack : "No stack trace available";
            const details = "Error: " + message + "\nSource: " + source + " at line " + lineno + ":" + colno + "\nStack:\n" + stack;
            window.AndroidInterface.logHtmlGlitch("browser.html", details);
        }
        return false; // Propagate to browser normally
    };

    window.onunhandledrejection = function(event) {
        if (window.AndroidInterface && window.AndroidInterface.logHtmlGlitch) {
            const reason = event.reason ? (event.reason.stack || event.reason) : "No rejection reason";
            window.AndroidInterface.logHtmlGlitch("browser.html", "Unhandled Promise Rejection:\n" + reason);
        }
    };

    /**
     * Resolves the user input and performs top-level redirection on the WebView context.
     * Treats valid-looking strings as URLs, and other inputs as Google Search queries.
     */
    function navigatePortalAddress() {
        const input = document.getElementById('portalAddressInput');
        let query = input.value.trim();
        if (!query) return;

        let targetUrl = query;

        // Check if the query is a search term or a specific URL
        const isUrlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;

        if (isUrlPattern.test(query)) {
            // If it behaves like a URL, ensure valid protocol prefix is attached
            if (!query.startsWith("http://") && !query.startsWith("https://")) {
                targetUrl = "https://" + query;
            }
        } else {
            // If it is a raw search query, route through Google Search natively
            targetUrl = "https://www.google.com/search?q=" + encodeURIComponent(query);
        }

        if (window.AndroidInterface && window.AndroidInterface.nativeLog) {
            window.AndroidInterface.nativeLog("Portal Redirecting Main Frame -> " + targetUrl, "native");
        }

        // Redirect the primary top-level WebView context to bypass iframe limitations
        window.location.href = targetUrl;
    }

    function handlePortalKey(event) {
        if (event.key === "Enter") {
            navigatePortalAddress();
        }
    }

    function exitBrowser() {
        if (window.AndroidInterface && window.AndroidInterface.loadLocalUrl) {
            window.AndroidInterface.loadLocalUrl('index.html');
        } else {
            window.location.href = 'index.html';
        }
    }

    function goToScraper() {
        if (window.AndroidInterface && window.AndroidInterface.loadLocalUrl) {
            window.AndroidInterface.loadLocalUrl('scraper.html');
        } else {
            window.location.href = 'scraper.html';
        }
    }
  </script>
</body>
</html>
