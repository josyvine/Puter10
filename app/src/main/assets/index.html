<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Puter Unofficial</title>
  <!-- DIAGNOSTIC CONSOLE: Must load first to capture all events -->
  <script src="debug_console.js"></script>
  <!-- SDK loaded without async to ensure availability for sync initialization -->
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@4.0.0/marked.min.js"></script>

  <!-- ENHANCEMENT: Highlight.js for Syntax Coloring -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

  <script>
    /* ============================================================================
     * ENHANCED MICROPHONE ERROR DIAGNOSTIC SYSTEM
     * ============================================================================ */
    
    const MicrophoneDiagnostics = {
      // Comprehensive error analysis
      analyzeGetUserMediaError: function(err) {
        const diagnostic = {
          errorType: err.name || "UnknownError",
          errorMessage: err.message || "No message provided",
          timestamp: new Date().toISOString(),
          possibleCauses: [],
          suggestedFixes: [],
          systemInfo: {
            browser: navigator.userAgent,
            audioDevices: "pending"
          }
        };

        switch(err.name) {
          case "NotReadableError":
            diagnostic.possibleCauses = [
              "HARDWARE_IN_USE: Microphone is already being used by another app/browser tab",
              "PERMISSION_DENIED_OS: Operating system denied microphone access",
              "HARDWARE_UNAVAILABLE: Microphone hardware not found or disconnected",
              "DRIVER_ISSUE: Audio driver not responding or outdated",
              "BROWSER_PERMISSION: Previously denied permission (check browser settings)",
              "SANDBOX_RESTRICTION: WebView sandbox preventing hardware access"
            ];
            diagnostic.suggestedFixes = [
              "1. Close other apps/tabs using the microphone",
              "2. Check Settings > Privacy > Microphone - ensure app is enabled",
              "3. Restart the app and try again",
              "4. Reconnect or test microphone in system settings",
              "5. Check Android logs for hardware driver errors",
              "6. Update or reinstall audio drivers",
              "7. Check if app has RECORD_AUDIO permission in manifest"
            ];
            break;

          case "NotAllowedError":
            diagnostic.possibleCauses = [
              "USER_DENIED: User clicked 'Deny' on permission prompt",
              "PERMISSION_REVOKED: Permission was previously granted but later revoked",
              "HTTPS_REQUIRED: Not using HTTPS (required for getUserMedia in prod)",
              "PRIVATE_BROWSING: Private/Incognito mode blocking hardware access"
            ];
            diagnostic.suggestedFixes = [
              "1. Grant microphone permission when prompted",
              "2. Check App > Settings > Permissions and enable Microphone",
              "3. For web: Ensure using HTTPS",
              "4. Disable Private/Incognito mode if applicable",
              "5. Clear browser cache/site data and retry"
            ];
            break;

          case "SecurityError":
            diagnostic.possibleCauses = [
              "CORS_VIOLATION: Cross-origin request blocked",
              "INSECURE_CONTEXT: Running in non-secure context",
              "FEATURE_POLICY: Feature policy blocking microphone"
            ];
            diagnostic.suggestedFixes = [
              "1. Ensure running on HTTPS",
              "2. Check iframe allow attributes include 'microphone'",
              "3. Review Content Security Policy headers"
            ];
            break;

          case "TypeError":
            diagnostic.possibleCauses = [
              "API_UNAVAILABLE: getUserMedia not available on this platform",
              "INVALID_CONSTRAINTS: Invalid audio constraints passed"
            ];
            diagnostic.suggestedFixes = [
              "1. Check browser/platform supports getUserMedia API",
              "2. Verify audio constraint parameters are valid",
              "3. Test in native implementation if available"
            ];
            break;

          default:
            diagnostic.possibleCauses = ["UNKNOWN_ERROR: Unidentified microphone acquisition failure"];
            diagnostic.suggestedFixes = ["Check browser console for additional error context"];
        }

        return diagnostic;
      },

      // Log comprehensive diagnostic to console and system
      logDiagnostic: function(diagnostic) {
        console.error("=".repeat(80));
        console.error("MICROPHONE ACQUISITION DIAGNOSTIC REPORT");
        console.error("=".repeat(80));
        console.error(`Error Type: ${diagnostic.errorType}`);
        console.error(`Message: ${diagnostic.errorMessage}`);
        console.error(`Timestamp: ${diagnostic.timestamp}`);
        console.error("\nPOSSIBLE CAUSES:");
        diagnostic.possibleCauses.forEach((cause, i) => {
          console.error(`  ${i+1}. ${cause}`);
        });
        console.error("\nRECOMMENDED FIXES:");
        diagnostic.suggestedFixes.forEach((fix, i) => {
          console.error(`  ${fix}`);
        });
        console.error("=".repeat(80));

        // Also send to Android interface if available
        if (window.AndroidInterface && window.AndroidInterface.logDiagnostic) {
          window.AndroidInterface.logDiagnostic(
            `Microphone Error: ${diagnostic.errorType}\nMessage: ${diagnostic.errorMessage}`,
            "MIC_ERROR"
          );
        }
      }
    };

    /* ============================================================================
     * ENHANCED TTS STATE MANAGEMENT
     * ============================================================================ */
    
    const TTSStateManager = {
      // Queue to manage TTS responses
      responseQueue: [],
      isCurrentlyPlaying: false,
      currentResponseId: null,

      // Enqueue a TTS response
      enqueueResponse: function(responseId, text) {
        this.responseQueue.push({
          id: responseId,
          text: text,
          timestamp: Date.now()
        });
        
        console.log(`[TTS] Queued response ${responseId}. Queue length: ${this.responseQueue.length}`);
        
        // Process queue if not already playing
        if (!this.isCurrentlyPlaying) {
          this.processQueue();
        }
      },

      // Process queue and speak next response
      processQueue: function() {
        if (this.responseQueue.length === 0) {
          this.isCurrentlyPlaying = false;
          this.currentResponseId = null;
          console.log("[TTS] Queue empty. Playback stopped.");
          return;
        }

        const nextResponse = this.responseQueue.shift();
        this.currentResponseId = nextResponse.id;
        this.isCurrentlyPlaying = true;

        console.log(`[TTS] Now playing response ${nextResponse.id}`);
        
        if (window.AndroidInterface && window.AndroidInterface.speakText) {
          window.AndroidInterface.speakText(nextResponse.text);
        }
      },

      // Call when TTS playback completes
      onTTSComplete: function() {
        console.log(`[TTS] Playback complete for response ${this.currentResponseId}`);
        this.processQueue(); // Process next in queue
      },

      // Clear entire queue
      clearQueue: function() {
        this.responseQueue = [];
        this.isCurrentlyPlaying = false;
        this.currentResponseId = null;
        console.log("[TTS] Queue cleared");
      },

      // Get queue status
      getStatus: function() {
        return {
          queueLength: this.responseQueue.length,
          isPlaying: this.isCurrentlyPlaying,
          currentResponseId: this.currentResponseId,
          queue: this.responseQueue
        };
      }
    };

    /* ============================================================================
     * ENHANCED MICROPHONE CAPTURE LIVE - WITH DIAGNOSTICS
     * ============================================================================ */

    async function initMicrophoneCaptureLive() {
        try {
            console.log("[MIC] Starting microphone acquisition...");
            
            // Check if audio devices are available
            try {
              const devices = await navigator.mediaDevices.enumerateDevices();
              const audioInputs = devices.filter(d => d.kind === 'audioinput');
              console.log(`[MIC] Found ${audioInputs.length} audio input device(s)`);
              
              if (audioInputs.length === 0) {
                console.warn("[MIC] WARNING: No audio input devices detected!");
              }
            } catch (enumErr) {
              console.warn("[MIC] Could not enumerate devices:", enumErr.message);
            }

            // Request microphone with detailed constraints
            const constraints = {
              audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
                sampleRate: 16000
              }
            };

            console.log("[MIC] Requesting microphone with constraints:", JSON.stringify(constraints));
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            
            liveMicStream = stream;
            console.log("[MIC] ✓ Microphone stream acquired successfully");
            console.log("[MIC] Stream tracks:", stream.getTracks().map(t => ({ kind: t.kind, enabled: t.enabled, state: t.readyState })));
            
            // Setup audio context
            liveAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            console.log("[MIC] Audio context created. Sample rate:", liveAudioContext.sampleRate);
            
            const source = liveAudioContext.createMediaStreamSource(stream);
            
            liveAudioProcessor = liveAudioContext.createScriptProcessor(2048, 1, 1);
            
            liveAudioProcessor.onaudioprocess = (e) => {
                if (!liveWs || liveWs.readyState !== WebSocket.OPEN) return;
                
                const inputFloat32 = e.inputBuffer.getChannelData(0);
                const pcmBuffer = new ArrayBuffer(inputFloat32.length * 2);
                const pcmView = new DataView(pcmBuffer);
                
                for (let i = 0; i < inputFloat32.length; i++) {
                    let sample = Math.max(-1, Math.min(1, inputFloat32[i]));
                    let int16Sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    pcmView.setInt16(i * 2, int16Sample, true);
                }
                
                const base64AudioChunk = arrayBufferToBase64(pcmBuffer);
                
                liveWs.send(JSON.stringify({
                    realtimeInput: {
                        audio: {
                            mimeType: "audio/pcm;rate=16000",
                            data: base64AudioChunk
                        }
                    }
                }));
            };
            
            source.connect(liveAudioProcessor);
            liveAudioProcessor.connect(liveAudioContext.destination);
            
            if (window.AndroidInterface) {
                window.AndroidInterface.logDiagnostic("WebRTC microphone capture active.", "HARDWARE");
            }
            console.log("[MIC] ✓ Microphone capture pipeline initialized successfully");
            
        } catch (err) {
            // ENHANCED ERROR DIAGNOSTICS
            console.error("[MIC] ✗ Microphone acquisition failed");
            
            const diagnostic = MicrophoneDiagnostics.analyzeGetUserMediaError(err);
            MicrophoneDiagnostics.logDiagnostic(diagnostic);
            
            // Cleanup any partial resources
            if (liveAudioContext && liveAudioContext.state !== 'closed') {
                try {
                  liveAudioContext.close();
                  console.log("[MIC] Audio context closed");
                } catch (e) {
                  console.warn("[MIC] Error closing audio context:", e.message);
                }
            }
            
            if (liveMicStream) {
                liveMicStream.getTracks().forEach(track => {
                    track.stop();
                    console.log("[MIC] Stopped stream track:", track.kind);
                });
                liveMicStream = null;
            }
            
            if (window.AndroidInterface) {
                const userMsg = `Microphone Error: ${err.name} - ${err.message}. ` +
                               `Check if:\n1) Another app is using mic\n2) Microphone permission is granted\n3) Microphone is connected`;
                window.AndroidInterface.logDiagnostic(userMsg, "WEBRTC_ERROR");
            }
            
            // IMPORTANT: Do NOT disconnect WebSocket - fall back to native capture
            console.log("[MIC] Falling back to native speech capture");
        }
    }

    // Make functions globally accessible
    window.initMicrophoneCaptureLive = initMicrophoneCaptureLive;
    window.TTSStateManager = TTSStateManager;
    window.MicrophoneDiagnostics = MicrophoneDiagnostics;
  </script>

</body>
</html>
