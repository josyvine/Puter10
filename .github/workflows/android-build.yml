name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build the APK using Gradle
      # Logic: Changed from assembleRelease to assembleDebug
      # This ensures the APK is automatically signed and installable on your phone
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'
          cache-disabled: true
          arguments: app:assembleDebug

      # Upload the generated Debug APK
      # Logic: Path updated to find the .apk file in the debug folder
      - name: Upload Puter Unofficial APK
        uses: actions/upload-artifact@v4
        with:
          name: Puter-Unofficial-Debug
          path: app/build/outputs/apk/debug/*.apk